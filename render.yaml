services:
  # FastAPI Backend
  - type: web
    name: shl-recommender-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false   # set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: index-storage
      mountPath: /opt/render/project/src/indexer/storage
      sizeGB: 1